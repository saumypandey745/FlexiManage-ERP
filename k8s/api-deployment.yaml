apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleximanage-api
  namespace: fleximanage-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fleximanage-api
  template:
    metadata:
      labels:
        app: fleximanage-api
    spec:
      containers:
      - name: fleximanage-api
        image: fleximanage/api:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: fleximanage-config
        - secretRef:
            name: fleximanage-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5
