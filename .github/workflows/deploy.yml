name: Deploy FlexiManage ERP

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
        working-directory: .

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build API
        run: npm run build
        working-directory: apps/api

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --project f6cfc991-f769-4af1-9b52-9eb8c7312760 --service fleximanage-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install Dependencies
        run: npm install
        working-directory: apps/web

      - name: Link Vercel Project
        run: |
          mkdir -p .vercel
          echo '{"projectId":"prj_bYMUapC71Jb8cixSR96xkTr4H7yu","orgId":"team_tcLkxLAl7IeyZRASP4dMskur"}' > .vercel/project.json
        working-directory: apps/web

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
        run: |
          npx vercel --prod --yes \
            --token=$VERCEL_TOKEN \
            -e NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
            -e NEXT_PUBLIC_WS_URL="$NEXT_PUBLIC_WS_URL"
        working-directory: apps/web
